        {id:"str",l:"🎯  交易策略"},
        {id:"sig",l:"🕯  进场信号"},
        {id:"rul",l:"🧠  心法规则"},
      ];
      const filtPats=filt==="all"?PATS:PATS.filter(p=>p.sig===filt);

      const pill=(c)=>({fontSize:10,fontWeight:700,fontFamily:"monospace",padding:"2px 7px",
        borderRadius:4,background:`${c}18`,color:c,border:`1px solid ${c}30`,whiteSpace:"nowrap"});
      const rowBox=(c)=>({display:"flex",gap:8,alignItems:"flex-start",padding:"5px 8px",
        borderRadius:6,background:`${c}0A`,marginBottom:4});
      const card={background:CD,border:`1px solid ${BD}`,borderRadius:12,overflow:"hidden"};

      return (
        <div style={{background:BG,minHeight:"100vh",color:TX,fontFamily:"'Inter','PingFang SC','Microsoft YaHei',sans-serif"}}>

          {/* Header */}
          <div style={{background:"linear-gradient(160deg,#15151C 0%,#1E1E27 100%)",borderBottom:`1px solid ${BD}`,padding:"18px 16px 13px"}}>
            <div style={{maxWidth:960,margin:"0 auto"}}>
              <div style={{fontSize:9,letterSpacing:3,color:MT,fontFamily:"monospace",textTransform:"uppercase",marginBottom:3}}>
                ◆ XAUUSD · Strategy &amp; Pattern Reference
              </div>
              <h1 style={{margin:"0 0 3px",fontSize:"clamp(18px,4vw,26px)",fontWeight:800,
                background:`linear-gradient(90deg,${GL} 0%,${G} 60%,#E6BE55 100%)`,
                WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                黄金完整策略 + 形态分析手册
              </h1>
              <p style={{margin:0,fontSize:12,color:MT}}>
                9 种形态识别 · 4 套策略框架 · K 线确认信号 · 交易心法与每日流程
              </p>
            </div>
          </div>

          {/* Tab bar */}
          <div style={{background:SF,borderBottom:`1px solid ${BD}`,overflowX:"auto"}}>
            <div style={{maxWidth:960,margin:"0 auto",display:"flex",padding:"0 12px"}}>
              {tabs.map(t=>(
                <button key={t.id} onClick={()=>{setTab(t.id);setSel(null);}}
                  style={{padding:"11px 16px",fontSize:12.5,fontWeight:600,border:"none",
                    background:"none",cursor:"pointer",
                    borderBottom:tab===t.id?`2px solid ${G}`:"2px solid transparent",
                    color:tab===t.id?GL:MT,transition:"all .2s",whiteSpace:"nowrap"}}>
                  {t.l}
                </button>
              ))}
            </div>
          </div>

          {/* Content */}
          <div style={{maxWidth:960,margin:"0 auto",padding:"18px 14px 60px"}}>

            {/* ── PATTERNS ── */}
            {tab==="pat"&&(
              <div>
                <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:12,color:MT}}>筛选：</span>
                  {[["all","全部 (9)"],["bullish","看多形态"],["bearish","看空形态"]].map(([v,l])=>(
                    <button key={v} onClick={()=>{setFilt(v);setSel(null);}}
                      style={{padding:"5px 14px",fontSize:11,fontWeight:600,cursor:"pointer",
                        border:`1px solid ${filt===v?G:BD}`,
                        background:filt===v?`${G}18`:"transparent",
                        color:filt===v?GL:MT,borderRadius:20}}>{l}</button>
                  ))}
                  <span style={{fontSize:11,color:MT,marginLeft:"auto"}}>点击卡片 → 查看进场 / 止损 / 目标规则</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(248px,1fr))",gap:13}}>
                  {filtPats.map(p=>{
                    const Fn=PSVG[p.k];
                    const open=sel===p.k;
                    const bull=p.sig==="bullish";
                    return(
                      <div key={p.k} onClick={()=>setSel(open?null:p.k)}
                        style={{...card,cursor:"pointer",
                          border:`1px solid ${open?(bull?GR:RD):BD}`,
                          transform:open?"scale(1.015)":"scale(1)",
                          transition:"border-color .2s,transform .2s"}}>
                        <div style={{padding:"8px 8px 2px",borderBottom:`1px solid ${BD}`}}>
                          {Fn&&<Fn/>}
                        </div>
                        <div style={{padding:"10px 12px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                            <span style={{fontSize:13.5,fontWeight:700}}>{p.zh}</span>
                            <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:12,
                              background:bull?`${GR}20`:`${RD}20`,color:bull?GR:RD}}>{bull?"看多":"看空"}</span>
                          </div>
                          <div style={{fontSize:10.5,color:MT,fontFamily:"monospace",marginBottom:7}}>{p.en}</div>
                          <div style={{display:"flex",gap:2,alignItems:"center"}}>
                            {[1,2,3,4,5].map(s=>(
                              <div key={s} style={{width:14,height:4,borderRadius:2,background:s<=p.star?G:`${G}22`}}/>
                            ))}
                            <span style={{fontSize:10,color:MT,marginLeft:4}}>可靠度</span>
                          </div>
                        </div>
                        {open&&(
                          <div style={{padding:"0 12px 12px",borderTop:`1px solid ${BD}`}}>
                            <p style={{fontSize:11.5,color:TX,lineHeight:1.75,margin:"10px 0 10px"}}>{p.desc}</p>
                            {[["进场",p.entry,bull?GR:RD],["止损",p.sl,RD],["目标",p.tp,GR],["提示",p.tip,G]].map(([l,v,c])=>(
                              <div key={l} style={rowBox(c)}>
                                <span style={pill(c)}>{l}</span>
                                <span style={{fontSize:11.5,color:TX,lineHeight:1.65,flex:1}}>{v}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ── STRATEGIES ── */}
            {tab==="str"&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(380px,1fr))",gap:16}}>
                {STRATS.map((s,i)=>(
                  <div key={i} style={{...card,cursor:"default"}}>
                    <div style={{height:3,background:`linear-gradient(90deg,${s.c},${s.c}44)`}}/>
                    <div style={{padding:"16px 18px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                        <div style={{width:40,height:40,borderRadius:10,background:`${s.c}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{s.ic}</div>
                        <div>
                          <div style={{fontSize:16,fontWeight:700}}>{s.name}</div>
                          <div style={{fontSize:10.5,color:MT,fontFamily:"monospace"}}>{s.en}</div>
                        </div>
                      </div>
                      <div style={{fontSize:12,color:TX,padding:"7px 10px",background:`${s.c}0D`,borderLeft:`3px solid ${s.c}`,borderRadius:"0 6px 6px 0",marginBottom:12,lineHeight:1.65}}>
                        <b style={{color:s.c}}>适用时机：</b>{s.when}
                      </div>
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:10.5,fontWeight:700,color:s.c,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>执行规则</div>
                        {s.rules.map((r,j)=>(
                          <div key={j} style={{display:"flex",gap:8,marginBottom:5,alignItems:"flex-start"}}>
                            <div style={{width:16,height:16,borderRadius:"50%",background:`${s.c}1A`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:s.c,fontWeight:700,flexShrink:0,marginTop:1}}>{j+1}</div>
                            <span style={{fontSize:12,lineHeight:1.65,color:TX}}>{r}</span>
                          </div>
                        ))}
                      </div>
                      <div style={{marginBottom:10}}>
                        {[["进场",s.entry,s.c],["止损",s.sl,RD],["目标",s.tp,GR]].map(([l,v,c])=>(
                          <div key={l} style={rowBox(c)}>
                            <span style={pill(c)}>{l}</span>
                            <span style={{fontSize:11.5,lineHeight:1.55,color:TX,flex:1}}>{v}</span>
                          </div>
                        ))}
                      </div>
                      <div style={{padding:"6px 10px",borderRadius:6,background:`${G}0A`,border:`1px solid ${G}1A`}}>
                        <span style={{fontSize:10.5,fontWeight:700,color:G}}>最佳场景：</span>
                        <span style={{fontSize:11.5,color:MT}}> {s.best}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ── SIGNALS ── */}
            {tab==="sig"&&(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:14,marginBottom:16}}>
                  {[["看多 K 线信号",SIGS.bull,GR],["看空 K 线信号",SIGS.bear,RD]].map(([title,items,c])=>(
                    <div key={title} style={{...card,cursor:"default"}}>
                      <div style={{padding:"10px 14px",borderBottom:`1px solid ${BD}`,background:`${c}0C`}}>
                        <span style={{fontSize:14,fontWeight:700,color:c}}>🕯 {title}</span>
                      </div>
                      <div style={{padding:"8px 12px"}}>
                        {items.map((it,i)=>(
                          <div key={i} style={{padding:"9px 0",borderBottom:i<items.length-1?`1px solid ${BD}`:"none"}}>
                            <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>{it.n}</div>
                            <div style={{fontSize:11.5,color:MT,lineHeight:1.68}}>{it.d}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{...card,cursor:"default"}}>
                  <div style={{padding:"11px 16px",borderBottom:`1px solid ${BD}`,background:`${G}0A`}}>
                    <span style={{fontSize:14,fontWeight:700,color:GL}}>⏰ 最佳进场时机（GMT+8）</span>
                  </div>
                  <div style={{padding:"12px 14px"}}>
                    {[
                      ["避开","08:00–15:00","亚洲盘","量小多假信号，新手尽量观望或只做区间","#555"],
                      ["观察","15:00–17:00","伦敦开盘","方向开始确立，等第一波冲击完成后再看机会","#7A7A30"],
                      ["最佳","20:30–24:00","欧美重叠","流动性最好，主力大行情高概率在这段出现",GR],
                      ["危险","数据前后15分","高影响事件","NFP / CPI / FOMC 期间不进场，等方向明确后再动",RD],
                      ["延续","00:00–03:00","纽约盘","延续欧美盘方向，流动性逐渐下降，注意滑点",BL],
                    ].map(([tag,time,session,desc,tc])=>(
                      <div key={session} style={{display:"flex",gap:10,marginBottom:9,alignItems:"flex-start",padding:"7px 9px",borderRadius:7,background:`${tc}0A`}}>
                        <span style={{fontSize:10,fontWeight:700,color:tc,border:`1px solid ${tc}40`,padding:"2px 6px",borderRadius:4,whiteSpace:"nowrap",fontFamily:"monospace",marginTop:1,minWidth:36,textAlign:"center"}}>{tag}</span>
                        <div>
                          <div style={{fontSize:12,fontWeight:600}}>
                            <span style={{fontFamily:"monospace",color:G}}>{time}</span>
                            <span style={{color:MT,marginLeft:6,fontSize:11}}>{session}</span>
                          </div>
                          <div style={{fontSize:11.5,color:MT,marginTop:2,lineHeight:1.55}}>{desc}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{margin:"0 14px 14px",padding:"10px 14px",background:`${G}0A`,borderRadius:8,border:`1px solid ${G}22`}}>
                    <div style={{fontSize:12,fontWeight:700,color:GL,marginBottom:5}}>进场前三问（快速自检）</div>
                    {["① 价格在关键支撑 / 阻力位附近？（不在中间无人区）","② 有 K 线确认信号？（不靠感觉预测）","③ 盈亏比 ≥ 1:1.5？止损位清晰合理？"].map((q,i)=>(
                      <div key={i} style={{fontSize:12,color:TX,lineHeight:1.75}}>{q}</div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ── RULES ── */}
            {tab==="rul"&&(
              <div>
                <div style={{background:`${G}0F`,border:`1px solid ${G}28`,borderRadius:12,padding:"14px 16px",marginBottom:16}}>
                  <div style={{fontSize:14,fontWeight:700,color:GL,marginBottom:5}}>核心信念</div>
                  <div style={{fontSize:13,color:TX,lineHeight:1.85}}>
                    交易亏钱 99% 不是因为不会看图，而是因为<b style={{color:G}}> 没有纪律</b>。
                    方向判断对了但不会止损 = 亏钱；判断错了但纪律到位 = 只亏小钱。
                    <b style={{color:GL}}> 纪律 &gt; 技术 &gt; 预测。</b>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:11,marginBottom:16}}>
                  {RULES.map((r,i)=>(
                    <div key={i} style={{...card,cursor:"default",display:"flex",gap:12,alignItems:"flex-start",padding:"13px 15px"}}>
                      <div style={{width:38,height:38,borderRadius:10,background:`${G}14`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{r.e}</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{r.t}</div>
                        <div style={{fontSize:12,color:MT,lineHeight:1.68}}>{r.b}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{...card,cursor:"default"}}>
                  <div style={{padding:"11px 16px",borderBottom:`1px solid ${BD}`,background:`${G}0A`}}>
                    <span style={{fontSize:14,fontWeight:700,color:GL}}>📋 每日五步开盘流程</span>
                  </div>
                  <div style={{padding:"14px 16px"}}>
                    {[
                      ["01","看新闻日历","打开 Forex Factory，标出今天所有红色高影响事件。数据公布前后 15 分钟内不进场。"],
                      ["02","画关键价位","在日线 + 4H 图标出今日支撑 / 阻力、昨日高低点、当日开盘价，不画线不进场。"],
                      ["03","写今日剧本","定方向（多 / 空 / 观望）并写下条件：\"价格到 X，出现 Y 信号，做 Z，止损 W\"。"],
                      ["04","等待信号来","不主动找机会，让市场来到你的计划位置，等确认信号才动手，没信号就空仓。"],
                      ["05","盘后复盘","截图每笔进出场，记录执行情况和情绪，填入复盘表更新胜率 / 盈亏比统计。"],
                    ].map(([n,t,d])=>(
                      <div key={n} style={{display:"flex",gap:12,marginBottom:11,alignItems:"flex-start"}}>
                        <div style={{width:30,height:30,borderRadius:8,background:`${G}1A`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:G,fontFamily:"monospace",flexShrink:0}}>{n}</div>
                        <div>
                          <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{t}</div>
                          <div style={{fontSize:12,color:MT,lineHeight:1.6}}>{d}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{margin:"0 14px 14px",padding:"10px 14px",background:`${G}0A`,borderRadius:8,border:`1px solid ${G}22`,textAlign:"center"}}>
                    <span style={{fontSize:12.5,color:GL,fontWeight:600,fontStyle:"italic"}}>
                      "位置不对就空仓 · 盈亏比不够就放过 · 守纪律比看对方向更重要"
                    </span>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<GoldGuide/>);
  </script>
</body>
</html>
